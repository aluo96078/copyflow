name: Build ClipFlow

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # Apple Silicon (M1)
    strategy:
      matrix:
        include:
          - goarch: arm64
            arch_name: apple-silicon
          - goarch: amd64
            arch_name: intel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
        run: |
          if [ "${{ matrix.goarch }}" = "amd64" ]; then
            # Cross-compile for Intel requires x86_64 SDK target
            export CGO_CFLAGS="-target x86_64-apple-macos12"
            export CGO_LDFLAGS="-target x86_64-apple-macos12"
          fi
          go build -o clipflow .

      - name: Package .app bundle
        run: |
          APP="ClipFlow.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp clipflow "$APP/Contents/MacOS/clipflow"
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>clipflow</string>
              <key>CFBundleIdentifier</key>
              <string>com.clipflow.app</string>
              <key>CFBundleName</key>
              <string>ClipFlow</string>
              <key>CFBundleDisplayName</key>
              <string>ClipFlow</string>
              <key>CFBundleVersion</key>
              <string>${{ github.ref_name }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ github.ref_name }}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>12.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          security create-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH

          security import certificate.p12 -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          rm certificate.p12

      - name: Sign app bundle
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          if [ -n "$MACOS_SIGNING_IDENTITY" ]; then
            echo "Signing with Developer ID: $MACOS_SIGNING_IDENTITY"
            codesign --force --deep --options runtime \
              --sign "$MACOS_SIGNING_IDENTITY" \
              --timestamp \
              ClipFlow.app
          else
            echo "No signing identity configured, using ad-hoc signing"
            codesign --force --deep --sign - ClipFlow.app
          fi

      - name: Notarize app
        if: env.MACOS_NOTARIZE_APPLE_ID != ''
        env:
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_PASSWORD: ${{ secrets.MACOS_NOTARIZE_PASSWORD }}
          MACOS_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent ClipFlow.app ClipFlow-notarize.zip
          xcrun notarytool submit ClipFlow-notarize.zip \
            --apple-id "$MACOS_NOTARIZE_APPLE_ID" \
            --password "$MACOS_NOTARIZE_PASSWORD" \
            --team-id "$MACOS_NOTARIZE_TEAM_ID" \
            --wait
          xcrun stapler staple ClipFlow.app
          rm ClipFlow-notarize.zip

      - name: Package artifact
        run: |
          ditto -c -k --keepParent ClipFlow.app ClipFlow-${{ matrix.arch_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipFlow-${{ matrix.arch_name }}
          path: ClipFlow-${{ matrix.arch_name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/ClipFlow-apple-silicon/ClipFlow-apple-silicon.zip
            artifacts/ClipFlow-intel/ClipFlow-intel.zip
